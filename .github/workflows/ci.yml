name: CI

on:
  push:
    branches:
      - main

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/PdfProcessing/PdfProcessing.slnx

      - name: Build solution
        run: dotnet build src/PdfProcessing/PdfProcessing.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test src/PdfProcessing/PdfProcessing.slnx --no-build --configuration Release